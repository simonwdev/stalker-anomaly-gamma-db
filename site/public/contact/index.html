    <style>
        body {
            overflow: auto;
        }
        .ack-page {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .ack-page h1 {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .ack-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
        }
        .ack-section h2 {
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.5rem;
        }
        .ack-section p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            line-height: 1.6;
        }
        .ack-section a {
            color: var(--accent);
            text-decoration: none;
        }
        .ack-section a:hover {
            text-decoration: underline;
        }
        .ack-back {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
        }
        .ack-back:hover {
            color: var(--accent);
        }
    </style>
